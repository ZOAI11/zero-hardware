; ============================================================
; ZoarkBot Edge Device — ESP32 Firmware
; PlatformIO Configuration
; ============================================================
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor baud (USB debug)
monitor_speed = 115200
upload_port   = COM3
monitor_port  = COM3
upload_speed  = 115200

; Library dependencies
; ─────────────────────────────────────────────────────────────
; Adafruit SSD1306     — OLED display driver
; Adafruit GFX         — Graphics primitives (dependency)
; MPU6050_tockn        — IMU driver (no-fuss, works on Wire)
; ArduinoJson          — JSON encode/decode for UART protocol
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    tockn/MPU6050_tockn @ ^1.5.2
    bblanchon/ArduinoJson @ ^7.0.4

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_RUNNING_CORE=1
