# /etc/asound.conf — ZoarkBot Pi Zero ALSA config
# Allows simultaneous capture (INMP441) + playback (MAX98357A) on googlevoicehat soundcard
# Copy to /etc/asound.conf on Pi Zero

pcm.!default {
    type asym
    playback.pcm { type plug; slave.pcm "dmix:0,0" }
    capture.pcm  { type plug; slave.pcm "dsnoop:0,0" }
}
ctl.!default { type hw; card 0 }
